<!DOCTYPE html>
<html>
<head>
  <title>Font Loading Example</title>
  <style>
    @font-face {
      font-family: 'Pirou';
      src: url('https://example.com/fonts/pirou.woff2') format('woff2'),
           url('https://example.com/fonts/pirou.woff') format('woff');
      /* Add additional font formats or sources as needed */
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'SourceHanSerifJP';
      src: url('https://example.com/fonts/sourcehanserifjp.woff2') format('woff2'),
           url('https://example.com/fonts/sourcehanserifjp.woff') format('woff');
      /* Add additional font formats or sources as needed */
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Aleo';
      src: url('https://example.com/fonts/aleo.woff2') format('woff2'),
           url('https://example.com/fonts/aleo.woff') format('woff');
      /* Add additional font formats or sources as needed */
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: 'Pirou', 'SourceHanSerifJP', 'Aleo', sans-serif;
    }
  </style>
</head>
<body>
  <h1>This is a heading using font Pirou</h1>
  <p>This is a paragraph using font SourceHanSerifJP</p>
  <h2>This is a sub-heading using font Aleo</h2>
</body>
</html>
